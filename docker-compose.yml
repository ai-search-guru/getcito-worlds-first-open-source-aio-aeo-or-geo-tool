# GetCito — local deploy, built from source.
#
# Usage (from repo root):
#   cp .env.example .env   # then fill in real values
#   docker compose build
#   docker compose up -d
#

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: getcito
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      start_period: 30s

  db-migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: migrate
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/getcito
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
      args:
        DEPLOYMENT_MODE: local
        VITE_DEPLOYMENT_MODE: local
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
