# GetCito — whitelabel (Auth0 SSO) deploy, built from source.
#
# Usage (from repo root, on the VPS):
#   cp .env.whitelabel.example .env   # then fill in real values
#   docker compose -f docker-compose.whitelabel.yml build
#   docker compose -f docker-compose.whitelabel.yml up -d
#
# The VITE_* values are read from .env at BUILD time (compose interpolates
# ${VAR} from .env) and baked into the browser bundle — that is why they appear
# under web.build.args. Server-only vars come from env_file at runtime.

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: getcito
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      start_period: 30s

  db-migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: migrate
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/getcito
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
      args:
        DEPLOYMENT_MODE: whitelabel
        VITE_DEPLOYMENT_MODE: whitelabel
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_APP_ICON: ${VITE_APP_ICON}
        VITE_APP_URL: ${VITE_APP_URL}
        VITE_APP_PARENT_NAME: ${VITE_APP_PARENT_NAME}
        VITE_APP_PARENT_URL: ${VITE_APP_PARENT_URL}
        VITE_OPTIMIZATION_URL_TEMPLATE: ${VITE_OPTIMIZATION_URL_TEMPLATE}
        VITE_ONBOARDING_REDIRECT_URL_TEMPLATE: ${VITE_ONBOARDING_REDIRECT_URL_TEMPLATE}
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID}
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:

